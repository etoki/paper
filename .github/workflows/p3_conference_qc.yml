name: P3 conference paper QC

on:
  push:
    branches:
      - main
      - "claude/conference-submission-strategy-*"
    paths:
      - "metaanalysis/conference_submissions/**"
      - "metaanalysis/reference_index.md"
      - ".github/workflows/p3_conference_qc.yml"
  pull_request:
    paths:
      - "metaanalysis/conference_submissions/**"
      - "metaanalysis/reference_index.md"
  workflow_dispatch:

jobs:
  qc:
    name: Numeric / DOI / Format checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib python-docx

      - name: Regenerate studies.csv
        run: python3 metaanalysis/conference_submissions/inputs/derive_studies_csv.py

      - name: Run ECEL pipeline
        run: python3 metaanalysis/conference_submissions/ecel/scripts/run_modality_meta.py

      - name: Run ICEEL pipeline
        run: python3 metaanalysis/conference_submissions/iceel/scripts/run_hofstede_meta.py

      - name: Run ICERI pipeline
        run: python3 metaanalysis/conference_submissions/iceri/scripts/run_cross_tab_meta.py

      - name: Render auto-tables
        run: python3 metaanalysis/conference_submissions/scripts/render_tables.py

      - name: Cross-paper numeric consistency + Round-4 sentinels
        run: python3 metaanalysis/conference_submissions/scripts/check_numbers.py

      - name: DOI syntax validation (offline)
        run: python3 metaanalysis/conference_submissions/scripts/check_dois.py --offline

      - name: DOI online resolution (best-effort, non-blocking)
        run: python3 metaanalysis/conference_submissions/scripts/check_dois.py
        continue-on-error: true

      - name: Format / page-count compliance
        run: python3 metaanalysis/conference_submissions/scripts/check_format.py
        continue-on-error: true

      - name: Build PRISMA flow diagrams
        run: python3 metaanalysis/conference_submissions/scripts/build_prisma_flow.py

      - name: Show generated artefacts
        run: |
          ls -la metaanalysis/conference_submissions/figures/
          ls -la metaanalysis/conference_submissions/{ecel,iceel,iceri}/results/

  build-docx:
    name: Rebuild paper docx (pandoc)
    needs: qc
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Rebuild full_paper + cover_letter docx (each venue)
        run: |
          set -e
          for v in ecel iceel iceri; do
            (cd metaanalysis/conference_submissions/$v && \
              pandoc full_paper.md   -o full_paper.docx && \
              pandoc cover_letter.md -o cover_letter.docx)
          done
          ls -la metaanalysis/conference_submissions/{ecel,iceel,iceri}/{full_paper,cover_letter}.docx

      - name: Upload docx artefacts
        uses: actions/upload-artifact@v4
        with:
          name: p3-conference-papers
          path: |
            metaanalysis/conference_submissions/ecel/full_paper.docx
            metaanalysis/conference_submissions/ecel/cover_letter.docx
            metaanalysis/conference_submissions/iceel/full_paper.docx
            metaanalysis/conference_submissions/iceel/cover_letter.docx
            metaanalysis/conference_submissions/iceri/full_paper.docx
            metaanalysis/conference_submissions/iceri/cover_letter.docx
            metaanalysis/conference_submissions/figures/*.png
            metaanalysis/conference_submissions/*/results/tables.md
          retention-days: 14
